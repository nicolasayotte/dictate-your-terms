name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config libclang-dev gcc g++ \
            libasound2-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev

      - name: Set LIBCLANG_PATH
        run: |
          LIBCLANG_DIR=$(dirname "$(find /usr/lib/llvm-*/lib -name 'libclang.so' 2>/dev/null | sort -V | tail -1)")
          echo "LIBCLANG_PATH=$LIBCLANG_DIR" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dyt-linux-x86_64
          path: |
            target/release/dyt
            target/release/dyt-daemon

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/dyt
            target/release/dyt-daemon

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Install LLVM (provides libclang for bindgen used by whisper-rs-sys) ──
      - name: Install LLVM
        run: choco install llvm --yes --no-progress
        shell: pwsh

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
        shell: pwsh

      # ── Rust toolchain ─────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # ── Build & test ───────────────────────────────────────────────
      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release

      # ── Artifacts & release ────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dyt-windows-x86_64
          path: |
            target/release/dyt.exe
            target/release/dyt-daemon.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/dyt.exe
            target/release/dyt-daemon.exe
